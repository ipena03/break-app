name: iOS Build

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      
uses: actions/checkout@v3

      
uses: subosito/flutter-action@v2
      with:
        flutter-version: 'stable'

      
run: flutter pub get

      
run: flutter build ios --release --no-codesign
